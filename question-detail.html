<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>题目详情 - 河北省公务员面试</title>
  <link rel="stylesheet" href="css/shared.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1A3A6B">
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth-guard.js"></script>
  <style>
    .detail-tags {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .type-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }
    .info-tag {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }
    .info-tag.green {
      background: #E6F9F4;
      color: #00B894;
    }
    .info-tag.orange {
      background: #FFF8E8;
      color: #F4A100;
    }
    .status-placeholder {
      text-align: center;
      padding: 60px 16px;
      color: var(--text-sub);
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-left">
      <a href="javascript:history.back()" class="back-btn">←</a>
      <span class="top-bar-title">题目详情</span>
    </div>
  </div>

  <div class="page-container" style="padding-top: 12px;">
    <!-- 状态消息（加载中 / 题目不存在） -->
    <div id="statusMessage" class="status-placeholder">加载中...</div>

    <!-- 题目信息（初始隐藏） -->
    <div id="detailContent" style="display:none;">
      <!-- 标签 -->
      <div class="detail-tags" id="tagContainer"></div>

      <!-- 题目内容 -->
      <div class="card" style="margin-bottom: 12px;">
        <h3 style="font-size: 16px; font-weight: 600; margin-bottom: 12px;">题目</h3>
        <p id="questionContent" style="font-size: 15px; line-height: 1.8; color: var(--text-main);"></p>
      </div>

      <!-- 答题要求 -->
      <div class="card" style="margin-bottom: 16px; background: #FFF8E8; border: 1px solid #FFF0C0;">
        <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--accent);">⏱ 答题要求</h4>
        <ul style="font-size: 13px; line-height: 1.8; color: var(--text-main); padding-left: 18px;">
          <li>思考时间：不超过 3 分钟</li>
          <li>答题时间：不超过 5 分钟</li>
          <li>建议总用时：8 分钟以内</li>
        </ul>
      </div>

      <!-- 操作按钮 -->
      <a id="btnTextAnswer" href="text-answer.html" class="btn btn-primary" style="margin-bottom: 12px;">✍️ 文字答题</a>
      <a id="btnVoiceAnswer" href="voice-answer.html" class="btn btn-outline" style="margin-bottom: 12px;">🎤 语音答题</a>
      <a id="btnAiAnswer" href="ai-answer.html" class="btn btn-outline">查看AI参考答案</a>
    </div>
  </div>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span>首页</span>
    </a>
    <a href="question-bank.html" class="nav-item">
      <span class="nav-icon">📚</span>
      <span>题库</span>
    </a>
    <a href="simulate-prep.html" class="nav-item active">
      <span class="nav-icon">🎯</span>
      <span>模拟</span>
    </a>
    <a href="record.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span>记录</span>
    </a>
    <a href="profile.html" class="nav-item">
      <span class="nav-icon">👤</span>
      <span>我的</span>
    </a>
  </nav>

  <script>
    (function () {
      // ---- 题型配色 ----
      var TYPE_STYLES = {
        '综合分析': { bg: '#EBF3FF', color: '#2D6BE4' },
        '计划组织': { bg: '#E8F8F0', color: '#00A86B' },
        '人际关系': { bg: '#FFF3E0', color: '#F57C00' },
        '情景应变': { bg: '#FEE8E8', color: '#C62828' },
        '自我认知': { bg: '#F3E8FF', color: '#7B1FA2' },
      };

      // ---- DOM 引用 ----
      var statusEl    = document.getElementById('statusMessage');
      var contentEl   = document.getElementById('detailContent');
      var tagEl       = document.getElementById('tagContainer');
      var contentP    = document.getElementById('questionContent');
      var btnText     = document.getElementById('btnTextAnswer');
      var btnVoice    = document.getElementById('btnVoiceAnswer');
      var btnAi       = document.getElementById('btnAiAnswer');

      // ---- 读取 URL 参数 ----
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');

      if (!id) {
        statusEl.textContent = '题目不存在';
        return;
      }

      // ---- 加载题目 ----
      SUPABASE.fetchQuestionById(id)
        .then(function (data) {
          if (!data) {
            statusEl.textContent = '题目不存在';
            return;
          }
          render(data);
        })
        .catch(function (err) {
          console.error('加载题目失败:', err);
          statusEl.textContent = '加载失败，请检查网络';
        });

      // ---- 渲染 ----
      function render(data) {
        // 隐藏状态消息，显示内容区
        statusEl.style.display = 'none';
        contentEl.style.display = '';

        // 存 localStorage
        localStorage.setItem('currentQuestionId', String(data.id));
        localStorage.setItem('currentQuestionContent', data.content || '');
        localStorage.setItem('currentQuestionType', data.question_type || '');

        // ---- 标签 ----
        var ts = TYPE_STYLES[data.question_type] || { bg: '#F0F0F0', color: '#666' };
        var html = '';

        // 题型标签
        html += '<span class="type-tag" style="background:' + ts.bg + ';color:' + ts.color + ';">'
          + escapeHtml(data.question_type) + '</span>';

        // 年份标签
        html += '<span class="info-tag green">' + escapeHtml(String(data.year)) + '年真题</span>';

        // 难度标签
        var stars = renderStars(data.difficulty);
        html += '<span class="info-tag orange">' + stars + '</span>';

        tagEl.innerHTML = html;

        // ---- 题目内容 ----
        var content = data.content || '(暂无题目内容)';
        contentP.textContent = content;

        // ---- 按钮链接携带 id ----
        var idParam = '?id=' + encodeURIComponent(data.id);
        btnText.href = 'text-answer' + idParam;
        btnVoice.href = 'voice-answer' + idParam;
        btnAi.href = 'ai-answer' + idParam;
      }

      function renderStars(difficulty) {
        var num = parseInt(difficulty, 10) || 3;
        var full = '';
        for (var i = 0; i < num; i++) full += '★';
        var empty = '';
        for (var i = num; i < 5; i++) empty += '☆';
        return '难度 ' + full + empty;
      }

      function escapeHtml(str) {
        if (!str) return '';
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
