<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>练习记录 - 河北省公务员面试</title>
  <link rel="stylesheet" href="css/shared.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1A3A6B">
  <script src="js/config.js"></script>
  <script src="js/auth-guard.js"></script>
</head>
<body>
  <div class="page-container">
    <div class="section-title">
      <span>练习记录</span>
      <span class="text-sub text-sm">共 12 条记录</span>
    </div>

    <!-- 统计概要 -->
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px;">
      <div class="card" style="text-align: center; padding: 12px 8px;">
        <div style="font-size: 20px; font-weight: 700; color: var(--secondary);">12</div>
        <div style="font-size: 11px; color: var(--text-sub);">本周</div>
      </div>
      <div class="card" style="text-align: center; padding: 12px 8px;">
        <div style="font-size: 20px; font-weight: 700; color: var(--ai-green);">7</div>
        <div style="font-size: 11px; color: var(--text-sub);">连续天数</div>
      </div>
      <div class="card" style="text-align: center; padding: 12px 8px;">
        <div style="font-size: 20px; font-weight: 700; color: var(--accent);">81.5</div>
        <div style="font-size: 11px; color: var(--text-sub);">平均分</div>
      </div>
    </div>

    <!-- 过滤 tab -->
    <div style="display: flex; gap: 4px; margin-bottom: 12px; background: var(--bg); border-radius: 10px; padding: 3px;">
      <span class="filter-chip active" style="flex:1; text-align: center; border: none; background: var(--card-bg);">全部</span>
      <span class="filter-chip" style="flex:1; text-align: center; border: none;">文字</span>
      <span class="filter-chip" style="flex:1; text-align: center; border: none;">语音</span>
    </div>

    <!-- 记录条目（可点击跳到 ai-answer.html） -->
    <a href="ai-answer.html" class="card" style="display: block; cursor: pointer;">
      <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 6px;">
        <div style="display: flex; gap: 6px;">
          <span class="tag tag-green">文字</span>
          <span class="tag tag-blue">综合分析</span>
        </div>
        <span style="font-size: 12px; color: var(--text-sub);">今天 14:30</span>
      </div>
      <h4 style="font-size: 14px; font-weight: 600; line-height: 1.5; margin-bottom: 4px;">如何看待基层干部"躺平"现象？</h4>
      <div style="display: flex; gap: 12px; font-size: 12px; color: var(--text-sub);">
        <span>得分: <strong style="color: var(--secondary);">84</strong> 分</span>
        <span>用时 4分32秒</span>
      </div>
    </a>

    <a href="ai-answer.html" class="card" style="display: block; cursor: pointer;">
      <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 6px;">
        <div style="display: flex; gap: 6px;">
          <span class="tag tag-green" style="background: #E6F9F4; color: var(--ai-green);">语音</span>
          <span class="tag tag-yellow">组织管理</span>
        </div>
        <span style="font-size: 12px; color: var(--text-sub);">昨天 09:15</span>
      </div>
      <h4 style="font-size: 14px; font-weight: 600; line-height: 1.5; margin-bottom: 4px;">组织一次乡村振兴调研活动</h4>
      <div style="display: flex; gap: 12px; font-size: 12px; color: var(--text-sub);">
        <span>得分: <strong style="color: var(--secondary);">78</strong> 分</span>
        <span>用时 3分58秒</span>
      </div>
    </a>

    <a href="ai-answer.html" class="card" style="display: block; cursor: pointer;">
      <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 6px;">
        <div style="display: flex; gap: 6px;">
          <span class="tag tag-green">文字</span>
          <span class="tag tag-red">应急应变</span>
        </div>
        <span style="font-size: 12px; color: var(--text-sub);">2026-05-09</span>
      </div>
      <h4 style="font-size: 14px; font-weight: 600; line-height: 1.5; margin-bottom: 4px;">办事大厅有群众不满服务态度大吵大闹</h4>
      <div style="display: flex; gap: 12px; font-size: 12px; color: var(--text-sub);">
        <span>得分: <strong style="color: var(--secondary);">91</strong> 分</span>
        <span>用时 4分10秒</span>
      </div>
    </a>

    <a href="ai-answer.html" class="card" style="display: block; cursor: pointer;">
      <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 6px;">
        <div style="display: flex; gap: 6px;">
          <span class="tag tag-green" style="background: #E6F9F4; color: var(--ai-green);">语音</span>
          <span class="tag tag-blue">综合分析</span>
        </div>
        <span style="font-size: 12px; color: var(--text-sub);">2026-05-08</span>
      </div>
      <h4 style="font-size: 14px; font-weight: 600; line-height: 1.5; margin-bottom: 4px;">习近平总书记说"江山就是人民"，你怎么理解？</h4>
      <div style="display: flex; gap: 12px; font-size: 12px; color: var(--text-sub);">
        <span>得分: <strong style="color: var(--secondary);">86</strong> 分</span>
        <span>用时 4分45秒</span>
      </div>
    </a>
  </div>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span>首页</span>
    </a>
    <a href="question-bank.html" class="nav-item">
      <span class="nav-icon">📚</span>
      <span>题库</span>
    </a>
    <a href="simulate-prep.html" class="nav-item">
      <span class="nav-icon">🎯</span>
      <span>模拟</span>
    </a>
    <a href="record.html" class="nav-item active">
      <span class="nav-icon">📊</span>
      <span>记录</span>
    </a>
    <a href="profile.html" class="nav-item">
      <span class="nav-icon">👤</span>
      <span>我的</span>
    </a>
  </nav>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
