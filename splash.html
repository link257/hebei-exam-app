<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>河北省公务员面试</title>
  <link rel="stylesheet" href="css/shared.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1A3A6B">
  <style>
    body {
      background: linear-gradient(135deg, var(--primary) 0%, #0F2444 100%);
      max-width: 390px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      color: white;
    }
    .splash-logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin-bottom: 24px;
      backdrop-filter: blur(4px);
    }
    .splash-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }
    .splash-sub {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 48px;
      text-align: center;
      line-height: 1.6;
    }
    .splash-loader {
      width: 48px;
      height: 4px;
      border-radius: 4px;
      background: rgba(255,255,255,0.2);
      overflow: hidden;
    }
    .splash-loader-bar {
      height: 100%;
      width: 0;
      background: var(--accent);
      border-radius: 4px;
      animation: loading 2.8s ease-in-out forwards;
    }
    @keyframes loading {
      0% { width: 0; }
      100% { width: 100%; }
    }
    .splash-version {
      position: absolute;
      bottom: 40px;
      font-size: 12px;
      opacity: 0.35;
    }
  </style>
</head>
<body>
  <div class="splash-logo">📋</div>
  <h1 class="splash-title">河北面试通</h1>
  <p class="splash-sub">河北省公务员面试模拟练习<br>AI智能评分 · 全真模拟 · 逐题精讲</p>
  <div class="splash-loader">
    <div class="splash-loader-bar"></div>
  </div>
  <span class="splash-version">v1.0.0</span>

  <script>
    setTimeout(function () {
      window.location.href = 'index.html';
    }, 3000);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
