<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>备考统计 - 河北省公务员面试</title>
  <link rel="stylesheet" href="css/shared.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1A3A6B">
  <script src="js/config.js"></script>
  <script src="js/auth-guard.js"></script>
  <style>
    .chart-bar {
      height: 8px;
      border-radius: 8px;
      background: #E5E7EB;
      overflow: hidden;
      flex: 1;
    }
    .chart-bar-fill {
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--secondary), var(--accent));
    }
    .chart-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .chart-label {
      width: 60px;
      font-size: 12px;
      color: var(--text-sub);
      text-align: right;
    }
    .chart-value {
      width: 28px;
      font-size: 12px;
      font-weight: 600;
      text-align: right;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="section-title">
      <span>备考统计</span>
    </div>

    <!-- 总体数据 -->
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px;">
      <div class="card" style="text-align: center; padding: 12px 4px;">
        <div style="font-size: 18px; font-weight: 700; color: var(--secondary);">36</div>
        <div style="font-size: 10px; color: var(--text-sub);">总题数</div>
      </div>
      <div class="card" style="text-align: center; padding: 12px 4px;">
        <div style="font-size: 18px; font-weight: 700; color: var(--ai-green);">12</div>
        <div style="font-size: 10px; color: var(--text-sub);">本周</div>
      </div>
      <div class="card" style="text-align: center; padding: 12px 4px;">
        <div style="font-size: 18px; font-weight: 700; color: var(--accent);">81.5</div>
        <div style="font-size: 10px; color: var(--text-sub);">平均分</div>
      </div>
      <div class="card" style="text-align: center; padding: 12px 4px;">
        <div style="font-size: 18px; font-weight: 700; color: var(--primary);">7</div>
        <div style="font-size: 10px; color: var(--text-sub);">连续天数</div>
      </div>
    </div>

    <!-- 得分趋势 -->
    <div class="card" style="margin-bottom: 12px;">
      <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 12px;">📈 得分趋势</h4>
      <div style="display: flex; align-items: flex-end; gap: 6px; height: 100px; padding: 0 4px;">
        <div style="flex:1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
          <div style="width: 100%; background: var(--secondary); border-radius: 4px 4px 0 0; height: 60%; min-height: 20px;"></div>
          <span style="font-size: 10px; color: var(--text-sub);">5/5</span>
        </div>
        <div style="flex:1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
          <div style="width: 100%; background: var(--secondary); border-radius: 4px 4px 0 0; height: 72%; min-height: 20px;"></div>
          <span style="font-size: 10px; color: var(--text-sub);">5/6</span>
        </div>
        <div style="flex:1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
          <div style="width: 100%; background: var(--secondary); border-radius: 4px 4px 0 0; height: 55%; min-height: 20px;"></div>
          <span style="font-size: 10px; color: var(--text-sub);">5/7</span>
        </div>
        <div style="flex:1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
          <div style="width: 100%; background: var(--secondary); border-radius: 4px 4px 0 0; height: 85%; min-height: 20px;"></div>
          <span style="font-size: 10px; color: var(--text-sub);">5/8</span>
        </div>
        <div style="flex:1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
          <div style="width: 100%; background: var(--secondary); border-radius: 4px 4px 0 0; height: 78%; min-height: 20px;"></div>
          <span style="font-size: 10px; color: var(--text-sub);">5/9</span>
        </div>
        <div style="flex:1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
          <div style="width: 100%; background: var(--secondary); border-radius: 4px 4px 0 0; height: 90%; min-height: 20px;"></div>
          <span style="font-size: 10px; color: var(--text-sub);">5/10</span>
        </div>
        <div style="flex:1; display: flex; flex-direction: column; align-items: center; gap: 4px;">
          <div style="width: 100%; background: var(--secondary); border-radius: 4px 4px 0 0; height: 82%; min-height: 20px;"></div>
          <span style="font-size: 10px; color: var(--text-sub);">今天</span>
        </div>
      </div>
    </div>

    <!-- 题型分布 -->
    <div class="card" style="margin-bottom: 12px;">
      <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 12px;">📊 题型掌握度</h4>
      <div class="chart-row">
        <span class="chart-label">综合分析</span>
        <div class="chart-bar"><div class="chart-bar-fill" style="width: 82%;"></div></div>
        <span class="chart-value">82</span>
      </div>
      <div class="chart-row">
        <span class="chart-label">组织管理</span>
        <div class="chart-bar"><div class="chart-bar-fill" style="width: 75%;"></div></div>
        <span class="chart-value">75</span>
      </div>
      <div class="chart-row">
        <span class="chart-label">应急应变</span>
        <div class="chart-bar"><div class="chart-bar-fill" style="width: 88%;"></div></div>
        <span class="chart-value">88</span>
      </div>
      <div class="chart-row" style="margin-bottom: 0;">
        <span class="chart-label">人际关系</span>
        <div class="chart-bar"><div class="chart-bar-fill" style="width: 79%;"></div></div>
        <span class="chart-value">79</span>
      </div>
    </div>

    <!-- 薄弱环节 -->
    <div class="card" style="background: #FDEDEC; border: 1px solid #FADBD8;">
      <h4 style="font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--danger);">🎯 需要加强</h4>
      <ul style="font-size: 13px; line-height: 1.8; padding-left: 18px;">
        <li>组织管理类对策不够具体</li>
        <li>综合分析题亮点金句不足</li>
        <li>答题时间控制需改善</li>
      </ul>
    </div>
  </div>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <a href="index.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span>首页</span>
    </a>
    <a href="question-bank.html" class="nav-item">
      <span class="nav-icon">📚</span>
      <span>题库</span>
    </a>
    <a href="simulate-prep.html" class="nav-item">
      <span class="nav-icon">🎯</span>
      <span>模拟</span>
    </a>
    <a href="record.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span>记录</span>
    </a>
    <a href="profile.html" class="nav-item">
      <span class="nav-icon">👤</span>
      <span>我的</span>
    </a>
  </nav>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
